---
- name: Rollback test loopbacks
  hosts: cisco_routers
  gather_facts: no

  tasks:
    - name: Remove Loopback200
      cisco.ios.ios_config:
        lines:
          - no interface Loopback200
      ignore_errors: yes

    - name: Remove Loopback201
      cisco.ios.ios_config:
        lines:
          - no interface Loopback201
      ignore_errors: yes

    - name: Remove Loopback202
      cisco.ios.ios_config:
        lines:
          - no interface Loopback202
      ignore_errors: yes

    - name: Verify rollback
      cisco.ios.ios_command:
        commands:
          - show ip interface brief
      register: after_rollback

    - name: Print state after rollback
      debug:
        msg: "{{ after_rollback.stdout[0] }}"